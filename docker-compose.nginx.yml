# version: "3.9"

# HTTP-only configuration for development/testing
# Use docker-compose.deploy.yml for production with HTTPS

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simplernote
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - simplernote_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - simplernote_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - simplernote_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://minio:9000/minio/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/simplernote
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-supersecretchangeme}
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-["http://localhost"]}
      - API_BASE_URL=${API_BASE_URL:-http://localhost/api}
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_PUBLIC_ENDPOINT=http://localhost/minio
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-minioadmin}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-minioadmin}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-simplernote}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_USE_SSL=${S3_USE_SSL:-false}
    networks:
      - simplernote_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - API_BASE_URL=http://localhost/api
    networks:
      - simplernote_network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.http.conf:/etc/nginx/nginx.conf:ro
    networks:
      - simplernote_network
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://nginx/health"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

networks:
  simplernote_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
