version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: simplernote_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simplernote
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: simplernote_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    container_name: simplernote_backend
    volumes:
      - ../apps/backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@postgres:5432/simplernote
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretchangeme
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_MINUTES=1440
      - API_KEY_SECRET=anothersecretvalue
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    container_name: simplernote_frontend
    volumes:
      - ../apps/frontend:/app
    ports:
      - "3000:3000"
    environment:
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - API_BASE_URL=http://backend:8000/api
    depends_on:
      - backend

volumes:
  postgres_data:
